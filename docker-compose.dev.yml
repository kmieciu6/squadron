services:
  cms:
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      PUBLIC_URL: ${PUBLIC_URL}
    command: npm run develop
    volumes:
      - ./cms:/opt/app
      - cms_node_modules:/opt/app/node_modules
      - ./cms/public/uploads:/opt/app/public/uploads
    ports:
      - "127.0.0.1:1337:1337"

volumes:
  cms_node_modules: